<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
body{font-family:-apple-system,BlinkMacSystemFont,sans-serif;background:#0a0a0f;color:#e4e4e7;margin:0;padding:20px;width:400px}
.header{display:flex;align-items:center;gap:10px;margin-bottom:14px}
.logo{width:32px;height:32px;background:linear-gradient(135deg,#14b8a6,#06b6d4);border-radius:8px;display:flex;align-items:center;justify-content:center;font-weight:700;color:#000}
.title{font-size:1.1rem;font-weight:700;color:#14b8a6}
.section{margin-bottom:14px}
.section-title{font-size:0.75rem;color:#a1a1aa;margin-bottom:6px;text-transform:uppercase;letter-spacing:0.5px}
.url{background:#18181b;border-radius:6px;padding:8px 12px;font-size:0.8rem;color:#06b6d4;word-break:break-all;margin-bottom:8px}
.meta-table{width:100%;font-size:0.75rem;border-collapse:collapse}
.meta-row{border-bottom:1px solid #27272a}
.meta-row:last-child{border-bottom:none}
.meta-key{color:#a1a1aa;padding:4px 0;vertical-align:top;width:40%}
.meta-val{color:#e4e4e7;padding:4px 0;word-break:break-all}
.tag{display:inline-block;padding:2px 8px;border-radius:4px;font-size:0.65rem;margin-right:4px;margin-bottom:4px}
.tag-og{color:#06b6d4}.tag-tw{color:#1da1f2}.tag-meta{color:#a78bfa}
.copy-box{background:#18181b;border:1px solid #27272a;border-radius:6px;padding:10px;font-size:0.8rem;word-break:break-all;color:#a78bfa}
.btn{display:block;width:100%;padding:10px;margin-top:10px;border:none;border-radius:6px;background:#14b8a6;color:#000;font-weight:600;cursor:pointer;text-align:center;font-size:0.85rem}
</style>
</head>
<body>
<div class="header">
<div class="logo">C</div>
<div class="title">Copy as Markdown</div>
</div>
<div class="section">
<div class="section-title">Quick Copy</div>
<div class="copy-box">[GitHub](https://github.com/ericjoye/copy-link-markdown)</div>
</div>
<div class="section">
<div class="section-title">Context Menu</div>
<div style="font-size:0.8rem;color:#a1a1aa">Right-click any page → Copy as Markdown link</div>
</div>
<div class="section">
<div class="section-title">Badge Feedback</div>
<div style="display:flex;align-items:center;gap:8px">
<div style="background:#14b8a6;color:#000;padding:4px 10px;border-radius:4px;font-size:0.7rem;font-weight:700">COPIED!</div>
<div style="font-size:0.75rem;color:#a1a1aa">Badge shows for 2 seconds after copy</div>
</div>
</div>
<div class="section">
<div class="section-title">Options</div>
<div style="font-size:0.8rem">Include page title · Include selection · Custom format</div>
</div>
<button class="btn">Open Chrome Web Store</button>
</body>
</html>
